<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — TeslaInvest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root{--red:#E31937;--blue:#005288;--bg:#080808;--surface:#111111;--glass:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);--text:#E8E8E8;--muted:#666;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  h1,h2,h3,h4,.logo{font-family:'Rajdhani',sans-serif;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0;}
  .orb-red{position:fixed;width:500px;height:500px;background:radial-gradient(circle,rgba(227,25,55,0.12) 0%,transparent 70%);top:-100px;left:-100px;pointer-events:none;}
  .orb-blue{position:fixed;width:600px;height:600px;background:radial-gradient(circle,rgba(0,82,136,0.1) 0%,transparent 70%);bottom:-200px;right:-200px;pointer-events:none;}

  .login-wrap{position:relative;z-index:10;display:grid;grid-template-columns:1fr 1fr;min-height:100vh;width:100%;}

  /* Left panel */
  .left-panel{background:linear-gradient(135deg,rgba(227,25,55,0.08),rgba(0,82,136,0.08));border-right:1px solid var(--border);padding:60px;display:flex;flex-direction:column;justify-content:space-between;}
  .left-panel .logo{font-size:1.6rem;font-weight:700;letter-spacing:2px;color:#fff;text-decoration:none;}
  .left-panel .logo span{color:var(--red);}
  .left-tagline{margin-top:auto;}
  .left-tagline h2{font-size:2.5rem;font-weight:700;line-height:1.1;margin-bottom:1rem;}
  .left-tagline p{color:#555;line-height:1.7;font-size:0.9rem;max-width:320px;}
  .left-stats{display:flex;gap:2rem;margin-top:2rem;}
  .left-stat .num{font-family:'Rajdhani',sans-serif;font-size:1.5rem;font-weight:700;color:var(--red);}
  .left-stat .lbl{font-size:0.7rem;color:#555;letter-spacing:1px;font-family:'Rajdhani',sans-serif;}
  .left-deco{font-family:'Rajdhani',sans-serif;font-size:8rem;font-weight:700;color:rgba(255,255,255,0.02);line-height:1;margin-top:2rem;word-break:break-all;}

  /* Right panel */
  .right-panel{display:flex;align-items:center;justify-content:center;padding:60px 50px;}
  .auth-box{width:100%;max-width:420px;}
  .auth-box h2{font-size:1.8rem;font-weight:700;letter-spacing:2px;margin-bottom:0.5rem;}
  .auth-box .subtitle{color:#555;font-size:0.85rem;margin-bottom:2rem;}

  /* Tabs */
  .tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:2rem;}
  .tab{flex:1;padding:12px;text-align:center;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:0.9rem;letter-spacing:2px;cursor:pointer;color:#555;border-bottom:2px solid transparent;transition:all 0.2s;background:none;border-top:none;border-left:none;border-right:none;}
  .tab.active{color:var(--red);border-bottom-color:var(--red);}

  /* Form */
  .form-group{margin-bottom:1.25rem;position:relative;}
  .form-group label{display:block;font-size:0.7rem;letter-spacing:2px;color:#888;font-family:'Rajdhani',sans-serif;font-weight:600;margin-bottom:0.5rem;}
  .form-group .input-wrap{position:relative;}
  .form-group .input-wrap i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#555;font-size:0.85rem;}
  .form-group input{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:#fff;padding:13px 14px 13px 40px;font-family:'DM Sans',sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.2s;}
  .form-group input:focus{border-color:rgba(227,25,55,0.4);background:rgba(227,25,55,0.03);}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}

  .check-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;}
  .check-label{display:flex;align-items:center;gap:8px;font-size:0.8rem;color:#666;cursor:pointer;}
  .check-label input[type=checkbox]{accent-color:var(--red);}
  .forgot{font-size:0.8rem;color:var(--red);text-decoration:none;}
  .forgot:hover{text-decoration:underline;}

  .submit-btn{width:100%;padding:14px;background:var(--red);color:#fff;border:none;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1rem;letter-spacing:3px;cursor:pointer;clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%);transition:all 0.3s;position:relative;overflow:hidden;}
  .submit-btn:hover{box-shadow:0 0 30px rgba(227,25,55,0.4);}
  .submit-btn:disabled{opacity:0.6;cursor:not-allowed;}

  .divider{display:flex;align-items:center;gap:1rem;margin:1.5rem 0;}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
  .divider span{color:#555;font-size:0.75rem;letter-spacing:1px;}

  .social-btns{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem;}
  .social-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:11px;background:var(--glass);border:1px solid var(--border);color:#aaa;font-size:0.85rem;cursor:pointer;transition:all 0.2s;font-family:'Rajdhani',sans-serif;font-weight:600;letter-spacing:1px;}
  .social-btn:hover{border-color:rgba(255,255,255,0.2);color:#fff;}

  .quick-link { text-align: center; margin-top: 1.5rem; }

  .tab-content{display:none;}
  .tab-content.active{display:block;}

  .error-msg{background:rgba(227,25,55,0.1);border:1px solid rgba(227,25,55,0.3);color:#ff6b6b;padding:10px 14px;font-size:0.8rem;margin-bottom:1rem;}
  .success-msg{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);color:#22c55e;padding:10px 14px;font-size:0.8rem;margin-bottom:1rem;}

  .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.6s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .auth-box{animation:fadeUp 0.6s ease forwards;}

  @media(max-width:1024px){
    .left-panel{padding:40px;}
    .right-panel{padding:40px;}
    .auth-box{max-width:380px;}
  }

  @media(max-width:768px){
    .login-wrap{grid-template-columns:1fr;}
    .left-panel{display:none;}
    .right-panel{padding:30px 20px;min-height:100vh;}
    .auth-box{max-width:100%;}
    .auth-box h2{font-size:1.5rem;}
    .form-group input{padding:12px 12px 12px 36px;font-size:0.9rem;}
    .form-row{grid-template-columns:1fr;}
    .submit-btn{padding:12px;font-size:0.9rem;}
    .social-btns{grid-template-columns:1fr;}
    .form-group .input-wrap i{left:12px;}
  }

  @media(max-width:480px){
    .right-panel{padding:20px 16px;min-height:100vh;display:flex;flex-direction:column;justify-content:center;}
    .auth-box{max-width:100%;}
    .auth-box h2{font-size:1.2rem;letter-spacing:1px;margin-bottom:0.3rem;}
    .auth-box .subtitle{font-size:0.8rem;margin-bottom:1.5rem;}
    .tabs{margin-bottom:1.5rem;}
    .tab{padding:10px;font-size:0.8rem;letter-spacing:1px;}
    .form-group{margin-bottom:1rem;}
    .form-group label{font-size:0.65rem;}
    .form-group input{padding:11px 11px 11px 34px;font-size:0.85rem;letter-spacing:0.5px;}
    .form-group .input-wrap i{font-size:0.8rem;left:10px;}
    .check-row{margin-bottom:1rem;font-size:0.75rem;}
    .check-label{font-size:0.75rem;gap:6px;}
    .forgot{font-size:0.75rem;}
    .divider{margin:1rem 0;}
    .divider span{font-size:0.7rem;}
    .social-btns{gap:0.75rem;}
    .social-btn{padding:10px;font-size:0.8rem;letter-spacing:0.5px;}
    .quick-link{margin-top:1rem;font-size:0.8rem;}
    .error-msg,.success-msg{padding:8px 12px;font-size:0.75rem;}
    body::before{background-size:40px 40px;}
  }

</style>
</head>
<body>
<div class="orb-red"></div>
<div class="orb-blue"></div>

<div class="login-wrap">
  <!-- Left Panel -->
  <div class="left-panel">
    <a href="index.html" class="logo">TESLA<span>INVEST</span></a>
    <div>
      <div class="left-tagline">
        <h2>INVEST IN<br>THE <span style="color:var(--red)">FUTURE.</span><br>TODAY.</h2>
        <p>Access exclusive high-yield plans backed by the world's most disruptive technology ventures.</p>
        <div class="left-stats">
          <div class="left-stat"><div class="num">200%</div><div class="lbl">MAX RETURN</div></div>
          <div class="left-stat"><div class="num">10K+</div><div class="lbl">INVESTORS</div></div>
          <div class="left-stat"><div class="num">24/7</div><div class="lbl">SUPPORT</div></div>
        </div>
      </div>
      <div class="left-deco">INVEST</div>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="right-panel">
    <div class="auth-box">
      <h2>WELCOME BACK</h2>
      <p class="subtitle">Sign in to access your investment dashboard</p>

      <div id="alertBox" style="display:none"></div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" onclick="switchTab('login')">LOGIN</button>
        <button class="tab" onclick="switchTab('register')">REGISTER</button>
      </div>

      <!-- Login Tab -->
      <div class="tab-content active" id="loginTab">
        <div class="form-group">
          <label>EMAIL ADDRESS</label>
          <div class="input-wrap"><i class="fas fa-envelope"></i><input type="email" id="loginEmail" placeholder="your@email.com"></div>
        </div>
        <div class="form-group">
          <label>PASSWORD</label>
          <div class="input-wrap"><i class="fas fa-lock"></i><input type="password" id="loginPwd" placeholder="••••••••"></div>
        </div>
        <div class="check-row">
          <label class="check-label"><input type="checkbox" id="rememberMe"> Remember me</label>
          <a href="#" class="forgot">Forgot Password?</a>
        </div>
        <button class="submit-btn" onclick="doLogin()" id="loginBtn">SIGN IN</button>
      </div>

      <!-- Register Tab -->
      <div class="tab-content" id="registerTab">
        <div class="form-group">
          <label>FULL NAME</label>
          <div class="input-wrap"><i class="fas fa-user"></i><input type="text" id="regName" placeholder="John Doe"></div>
        </div>
        <div class="form-group">
          <label>EMAIL ADDRESS</label>
          <div class="input-wrap"><i class="fas fa-envelope"></i><input type="email" id="regEmail" placeholder="your@email.com"></div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>PASSWORD</label>
            <div class="input-wrap"><i class="fas fa-lock"></i><input type="password" id="regPwd" placeholder="Min 6 chars"></div>
          </div>
          <div class="form-group">
            <label>CONFIRM PASSWORD</label>
            <div class="input-wrap"><i class="fas fa-lock"></i><input type="password" id="regPwd2" placeholder="Repeat"></div>
          </div>
        </div>
        <div class="form-group">
          <label>REFERRAL CODE (OPTIONAL)</label>
          <div class="input-wrap"><i class="fas fa-tag"></i><input type="text" id="regRef" placeholder="e.g. ELON2024"></div>
        </div>
        <button class="submit-btn" onclick="handleRegister(document.getElementById('regEmail').value, document.getElementById('regPwd').value, document.getElementById('regName').value)" id="regBtn">CREATE ACCOUNT</button>
      </div>

    </div>
  </div>
</div>

<script src="../app.js"></script>
<script>
function switchTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active', (tab==='login'&&i===0)||(tab==='register'&&i===1)));
  document.getElementById('loginTab').classList.toggle('active', tab==='login');
  document.getElementById('registerTab').classList.toggle('active', tab==='register');
  hideAlert();
}

function showAlert(msg, type='error'){
  const box = document.getElementById('alertBox');
  box.className = type==='error'?'error-msg':'success-msg';
  box.textContent = msg;
  box.style.display = 'block';
}
function hideAlert(){ document.getElementById('alertBox').style.display='none'; }

// Login wrapper
window.doLogin = function(){
  const email = document.getElementById('loginEmail').value.trim();
  const pwd = document.getElementById('loginPwd').value;
  // handleLogin in app.js reads values from DOM when called without params
  // but we also support passing them directly for clarity
  if (typeof handleLogin === 'function') {
    // prefer calling the shared handler which will store token and redirect
    handleLogin(email, pwd);
  }
};

// Register wrapper
window.doRegister = function(){
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pwd = document.getElementById('regPwd').value;
  const pwd2 = document.getElementById('regPwd2').value;
  
  if (!pwd || pwd !== pwd2) {
    showAlert('Passwords do not match');
    return;
  }
  if (pwd.length < 6) {
    showAlert('Password must be at least 6 characters');
    return;
  }
  
  handleRegister(email, pwd, name);
};

// Auto-login check
// Auto-login check - ONLY redirect if truly need to
// Don't auto-redirect logged-in users - let them manually navigate
(function checkAutoRedirect() {
  // Don't do anything - if user is logged in, they're here by choice
  // or will be redirected by other logic. Don't create a redirect chain.
})();

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    document.getElementById('loginTab').classList.contains('active') ? doLogin() : doRegister();
  }
});
</script>
</body>
</html>
